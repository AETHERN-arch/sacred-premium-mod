<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED STORE</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial;
  background:#050010;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background: radial-gradient(circle at top,#12001f,#050010);
}

.bg::before{
  content:"";
  position:absolute;
  inset:-50%;
  background:
    repeating-linear-gradient(90deg, rgba(255,0,170,0.08) 0 1px, transparent 1px 90px),
    repeating-linear-gradient(0deg, rgba(0,255,255,0.05) 0 1px, transparent 1px 90px);
  transform:rotate(12deg);
  animation:gridMove 14s linear infinite;
}

.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,0,170,0.25), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(0,255,255,0.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(120,0,255,0.2), transparent 50%);
  filter:blur(18px);
  animation:glowMove 6s ease-in-out infinite;
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  background:rgba(10,0,20,0.4);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,0,170,0.2);
  position:relative;
  z-index:120;
}

header h1{
  font-size:18px;
  color:#ff4fd8;
  text-shadow:0 0 15px #ff4fd8;
}

/* ================= MENU BUTTON ================= */
.menu-btn{
  width:45px;
  height:45px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,255,0.2);
  border-radius:10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
  cursor:pointer;
  z-index:130;
}

.menu-btn span{
  width:22px;
  height:2px;
  background:#00e5ff;
  box-shadow:0 0 10px #00e5ff;
}

/* ================= OVERLAY (FIXED) ================= */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
  transition:0.25s ease;
  z-index:80; /* LOWER than dropdown */
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ================= DROPDOWN (FIXED TOP LAYER) ================= */
.dropdown{
  position:absolute;
  right:20px;
  top:70px;
  width:240px;
  background:rgba(10,0,20,0.95);
  border:1px solid rgba(0,255,255,0.25);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;

  opacity:0;
  transform:translateY(-20px);
  pointer-events:none;
  transition:0.25s ease;

  z-index:150; /* IMPORTANT FIX */
}

.dropdown.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.dropdown button{
  padding:14px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.dropdown button:hover{
  background:rgba(0,255,255,0.12);
  padding-left:18px;
}

/* ================= SECTIONS ================= */
.section{
  display:none;
  padding:20px;
}

.section.active{
  display:block;
}

/* ================= PRODUCTS ================= */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(20,0,30,0.5);
  border:1px solid rgba(255,0,170,0.25);
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  backdrop-filter:blur(10px);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(0,255,255,0.2);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#ff4fd8;
  font-weight:bold;
  text-shadow:0 0 10px #ff4fd8;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(135deg,#ff4fd8,#7a00ff,#00e5ff);
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* ================= ANIMATIONS ================= */
@keyframes gridMove{
  0%{transform:translate(0,0) rotate(12deg);}
  100%{transform:translate(-120px,-120px) rotate(12deg);}
}

@keyframes glowMove{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(40px,-30px);}
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HEADER -->
<header>

  <h1>SACRED STORE</h1>

  <button class="menu-btn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <!-- DROPDOWN -->
  <div class="dropdown" id="dropdown">

    <button onclick="show('products')">📦 PRODUCTS</button>
    <button onclick="show('telegram')">📢 TELEGRAM</button>
    <button onclick="show('tiktok')">🎵 TIKTOK</button>

  </div>

</header>

<!-- PRODUCTS -->
<section id="products" class="section active">

  <div class="container">

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>7 DAYS PREMIUM</h3>
        <div class="price">₱150</div>
        <button class="btn" onclick="buy('7 DAYS')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>15 DAYS PREMIUM</h3>
        <div class="price">₱250</div>
        <button class="btn" onclick="buy('15 DAYS')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>1 MONTH PREMIUM</h3>
        <div class="price">₱400</div>
        <button class="btn" onclick="buy('1 MONTH')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>LIFETIME</h3>
        <div class="price">₱650</div>
        <button class="btn" onclick="buy('LIFETIME')">BUY NOW</button>
      </div>
    </div>

  </div>

</section>

<!-- TELEGRAM -->
<section id="telegram" class="section">
  <h2>TELEGRAM CHANNELS</h2>
  <p>@sacredofficial</p>
  <p>@SacredSyntaxJamalShane</p>
</section>

<!-- TIKTOK -->
<section id="tiktok" class="section">
  <h2>TIKTOK</h2>
  <p>@aethernmodz</p>
  <p>@sacredglidez</p>
</section>

<script>

function toggleMenu(){
  document.getElementById("dropdown").classList.toggle("show");
  document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
  document.getElementById("dropdown").classList.remove("show");
  document.getElementById("overlay").classList.remove("active");
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  closeMenu();
}

function buy(item){
  window.open(
    "https://t.me/sacredph?text=" + encodeURIComponent("Buy: " + item),
    "_blank"
  );
}

</script>

</body>
</html>
