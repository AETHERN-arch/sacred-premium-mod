<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SACRED PREMIUM MODZZZ</title>  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background: radial-gradient(circle at top, #0a0a0f, #000000);
      color:white;
      overflow-x:hidden;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 40px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .logo{
      font-size:20px;
      font-weight:bold;
      color:#00e5ff;
      letter-spacing:2px;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:30px;
    }

    .hero img{
      width:260px;
      height:260px;
      object-fit:cover;
      border-radius:18px;
      border:2px solid rgba(0,229,255,0.2);
      box-shadow:0 0 40px rgba(0,229,255,0.15);
      margin-bottom:20px;
    }

    .hero h1{
      font-size:44px;
      color:#00e5ff;
      text-shadow:0 0 15px rgba(0,229,255,0.3);
      margin-bottom:10px;
    }

    .hero p{
      max-width:700px;
      opacity:0.8;
      line-height:1.6;
      margin-bottom:20px;
    }

    .price-box{
      background:rgba(255,255,255,0.03);
      padding:20px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      max-width:520px;
      text-align:left;
      white-space:pre-wrap;
      font-size:14px;
      line-height:1.6;
    }

    .btn{
      margin-top:20px;
      padding:14px 28px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#00e5ff,#0066ff);
      color:white;
      cursor:pointer;
      font-size:16px;
      transition:0.2s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .modal-content{
      background:#0b0b12;
      padding:25px;
      border-radius:16px;
      width:320px;
      border:1px solid rgba(255,255,255,0.1);
    }

    .plan{
      background:rgba(255,255,255,0.05);
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.08);
    }

    .plan:hover{
      border-color:#00e5ff;
    }

    .close{
      float:right;
      cursor:pointer;
      color:#ff4d4d;
    }
  </style></head>
<body><div class="navbar">
  <div class="logo">SACRED PREMIUM MODZZZ</div>
  <button class="btn" onclick="toggleAdmin()">ADMIN PANEL</button>
</div><section class="hero">
  <h1>CODM PREMIUM STORE</h1>
  <p>Premium dark CODM-themed shop with Telegram ordering system.</p>
</section><!-- PRODUCT AREA --><section class="products" id="products"></section><!-- ADMIN PANEL --><div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h2>ADMIN DASHBOARD</h2>
    <span onclick="toggleAdmin()" style="cursor:pointer">✖</span>
  </div>  <input type="password" id="adminPassword" placeholder="Enter admin password" />
  <button class="btn" onclick="loginAdmin()">LOGIN</button>  <div id="adminContent" style="display:none;margin-top:20px;">
    <h3>Add Product</h3><input type="text" id="productName" placeholder="Product Name" />
<input type="text" id="productPrice" placeholder="Price" />
<textarea id="productDesc" placeholder="Description"></textarea>
<input type="file" id="productImage" accept="image/*" />

<button class="btn" onclick="addProduct()">ADD PRODUCT</button>

<div id="productManager"></div>

  </div>
</div><style>
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:40px;
}

.product-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,229,255,0.15);
  border-radius:18px;
  padding:15px;
  box-shadow:0 0 20px rgba(0,229,255,0.08);
}

.product-card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:12px;
}

.product-card h3{
  color:#00e5ff;
  margin-top:12px;
}

.product-card p{
  opacity:0.8;
  margin-top:6px;
}

.product-card .price{
  font-size:20px;
  margin-top:10px;
  color:#00e5ff;
}

.admin-panel{
  position:fixed;
  top:0;
  right:-450px;
  width:420px;
  height:100vh;
  background:#05070d;
  border-left:1px solid rgba(255,255,255,0.1);
  padding:20px;
  overflow-y:auto;
  transition:0.3s;
  z-index:9999;
}

.admin-panel.active{
  right:0;
}

.admin-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.admin-panel input,
.admin-panel textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#0d1117;
  border:none;
  border-radius:10px;
  color:white;
}

.manage-card{
  background:#0d1117;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
}

.delete-btn{
  background:#ff3b3b;
  margin-top:10px;
}
</style><script>
const ADMIN_PASSWORD = "sacred123";
let products = JSON.parse(localStorage.getItem("products")) || [];

function toggleAdmin(){
  document.getElementById('adminPanel').classList.toggle('active');
}

function loginAdmin(){
  const pass = document.getElementById('adminPassword').value;

  if(pass === ADMIN_PASSWORD){
    document.getElementById('adminContent').style.display='block';
  } else {
    alert('Wrong password');
  }
}

function saveProducts(){
  localStorage.setItem("products", JSON.stringify(products));
}

function renderProducts(){
  const container = document.getElementById('products');
  const manager = document.getElementById('productManager');

  container.innerHTML = '';
  manager.innerHTML = '<h3 style="margin-top:20px">Your Products</h3>';

  products.forEach((product,index)=>{
    container.innerHTML += `
      <div class="product-card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>${product.desc}</p>
        <div class="price">${product.price}</div>
        <button class="btn" onclick="buyProduct('${product.name}')">BUY NOW</button>
      </div>
    `;

    manager.innerHTML += `
      <div class="manage-card">
        <h4>${product.name}</h4>
        <p>${product.price}</p>
        <button class="btn delete-btn" onclick="deleteProduct(${index})">DELETE</button>
      </div>
    `;
  });
}

function addProduct(){
  const name = document.getElementById('productName').value;
  const price = document.getElementById('productPrice').value;
  const desc = document.getElementById('productDesc').value;
  const file = document.getElementById('productImage').files[0];

  if(!file){
    alert('Please select image');
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){
    products.push({
      name:name,
      price:price,
      desc:desc,
      image:e.target.result
    });

    saveProducts();
    renderProducts();
  }

  reader.readAsDataURL(file);
}

function deleteProduct(index){
  products.splice(index,1);
  saveProducts();
  renderProducts();
}

function buyProduct(productName){
  const msg = encodeURIComponent('Hi, I want to buy ' + productName + ' from SACRED PREMIUM MODZZZ');
  window.open('https://t.me/sacredph?text=' + msg, '_blank');
}

renderProducts();
</script></body>
</html>
