<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED STORE</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial;
  background:#040008;
  color:white;
  overflow-x:hidden;
  cursor:none;
}

/* ================= CURSOR GLOW ================= */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ff4fd8;
  box-shadow:0 0 20px #ff4fd8,0 0 40px #7a00ff;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background: radial-gradient(circle at top,#1a0025,#040008);
}

/* GRID */
.bg::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    repeating-linear-gradient(90deg, rgba(255,0,170,0.08) 0 1px, transparent 1px 80px),
    repeating-linear-gradient(0deg, rgba(0,200,255,0.05) 0 1px, transparent 1px 80px);
  animation:gridMove 12s linear infinite;
  transform:rotate(12deg);
}

/* GLOW ORBS */
.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,170,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(140,0,255,0.18), transparent 50%);
  animation:glowMove 6s ease-in-out infinite;
  filter: blur(10px);
}

/* ================= GLITCH INTRO ================= */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9998;
  animation:fadeOut 3.5s forwards;
}

.intro h1{
  font-size:28px;
  color:#ff4fd8;
  text-shadow:0 0 20px #ff4fd8;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  20%{transform:translate(-2px,2px);}
  40%{transform:translate(2px,-2px);}
  60%{transform:translate(-1px,1px);}
  80%{transform:translate(1px,-1px);}
  100%{transform:translate(0);}
}

@keyframes fadeOut{
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0;visibility:hidden;}
}

/* ================= HEADER ================= */
header{
  text-align:center;
  padding:40px 20px 10px;
}

header h1{
  color:#ff4fd8;
  text-shadow:0 0 10px #ff4fd8,0 0 30px #7a00ff;
}

/* ================= GRID ================= */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:25px;
}

/* ================= CARD ================= */
.card{
  background:rgba(20,0,30,0.6);
  border-radius:16px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
  border:1px solid rgba(255,0,170,0.2);
  backdrop-filter: blur(10px);
}

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(45deg,#ff4fd8,#7a00ff,#00e5ff);
  z-index:-1;
  filter:blur(12px);
  opacity:0.3;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

.card:hover::before{
  opacity:0.8;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#ff4fd8;
  font-size:20px;
  font-weight:bold;
  text-shadow:0 0 10px #ff4fd8;
}

.desc{
  opacity:0.8;
  font-size:13px;
  margin-top:8px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(135deg,#ff4fd8,#7a00ff,#00e5ff);
  box-shadow:0 0 15px rgba(255,0,170,0.5);
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(255,0,170,0.8);
}

/* ANIMATIONS */
@keyframes gridMove{
  0%{transform:translate(0,0) rotate(12deg);}
  100%{transform:translate(-80px,-80px) rotate(12deg);}
}

@keyframes glowMove{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(40px,-25px);}
}

</style>
</head>

<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- INTRO -->
<div class="intro">
  <h1>SACRED SYSTEM BOOTING...</h1>
</div>

<!-- HEADER -->
<header>
  <h1>FINAL BOSS STORE</h1>
  <p>Ultra Neon Cyber Market</p>
</header>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
    <div class="content">
      <h3>7 DAYS PREMIUM</h3>
      <div class="price">₱150</div>
      <div class="desc">Short access package</div>
      <button class="btn" onclick="buy('7 DAYS')">BUY NOW</button>
    </div>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
    <div class="content">
      <h3>15 DAYS PREMIUM</h3>
      <div class="price">₱250</div>
      <div class="desc">Balanced plan</div>
      <button class="btn" onclick="buy('15 DAYS')">BUY NOW</button>
    </div>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
    <div class="content">
      <h3>1 MONTH PREMIUM</h3>
      <div class="price">₱400</div>
      <div class="desc">Full access plan</div>
      <button class="btn" onclick="buy('1 MONTH')">BUY NOW</button>
    </div>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
    <div class="content">
      <h3>LIFETIME</h3>
      <div class="price">₱650</div>
      <div class="desc">Forever unlock</div>
      <button class="btn" onclick="buy('LIFETIME')">BUY NOW</button>
    </div>
  </div>

</div>

<script>

/* BUY */
function buy(item){
  window.open(
    "https://t.me/sacredph?text=" +
    encodeURIComponent("I want to buy: " + item),
    "_blank"
  );
}

/* CURSOR FOLLOW */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

</script>

</body>
</html>
