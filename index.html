<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED SHOP</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070d;
color:white;
}

/* TOP BAR */
.top{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#0b0b12;
border-bottom:1px solid #222;
}

.logo{
color:#00e5ff;
font-weight:bold;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
padding:15px;
}

.card{
background:#111;
border:1px solid #00e5ff33;
border-radius:12px;
padding:10px;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

.card button{
width:100%;
padding:10px;
margin-top:8px;
background:#00e5ff;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ADMIN PANEL */
#admin{
position:fixed;
right:-380px;
top:0;
width:340px;
height:100vh;
background:#0b0b12;
padding:15px;
transition:0.3s;
overflow:auto;
border-left:1px solid #222;
}

#admin.active{
right:0;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
background:#111;
border:none;
color:white;
border-radius:8px;
}

.save{
width:100%;
padding:10px;
margin-top:10px;
background:#00e5ff;
border:none;
cursor:pointer;
}

.msg{
background:#111;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #00e5ff33;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="top">
<div class="logo">SACRED SHOP</div>
<button onclick="toggleAdmin()">☰ Admin</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="products"></div>

<!-- ADMIN -->
<div id="admin">

<h2>ADMIN PANEL</h2>

<input type="password" id="pass" placeholder="Admin password">
<button class="save" onclick="login()">Unlock</button>

<div id="panel" style="display:none">

<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="img">
<button class="save" onclick="add()">Add Product</button>

<hr>

<h3>Orders</h3>
<div id="orders"></div>

</div>
</div>

<script>

let admin=false;

let products=JSON.parse(localStorage.getItem("p"))||[];
let orders=JSON.parse(localStorage.getItem("o"))||[];

const PASS="sacred123";

/* TOGGLE ADMIN PANEL */
function toggleAdmin(){
document.getElementById("admin").classList.toggle("active");
}

/* LOGIN */
function login(){
if(pass.value===PASS){
admin=true;
panel.style.display="block";
alert("Admin unlocked");
}else{
alert("Wrong password");
}
}

/* ADD PRODUCT (ADMIN ONLY) */
function add(){

let reader=new FileReader();

reader.onload=e=>{

products.push({
name:name.value,
price:price.value,
desc:desc.value,
img:e.target.result
});

save();
render();
}

reader.readAsDataURL(img.files[0]);
}

/* BUY (PUBLIC) */
function buy(n,p){

orders.push({
name:n,
price:p,
status:"pending"
});

save();
renderOrders();
alert("Order placed!");
}

/* SAVE */
function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("o",JSON.stringify(orders));
}

/* RENDER PRODUCTS */
function render(){

let box=document.getElementById("products");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>
<b>${p.price}</b>

<button onclick="buy('${p.name}','${p.price}')">
BUY
</button>

</div>`;
});
}

/* ORDERS */
function renderOrders(){

ordersBox.innerHTML="";

orders.forEach(o=>{
ordersBox.innerHTML+=`
<div class="msg">
<b>${o.name}</b><br>
${o.price}<br>
${o.status}
</div>`;
});
}

/* INIT */
render();

</script>

</body>
</html>
