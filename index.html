<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED STORE</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial;
  background:#040008;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background: radial-gradient(circle at top,#1a0025,#040008);
}

.bg::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    repeating-linear-gradient(90deg, rgba(255,0,170,0.08) 0 1px, transparent 1px 80px),
    repeating-linear-gradient(0deg, rgba(0,200,255,0.05) 0 1px, transparent 1px 80px);
  animation:gridMove 12s linear infinite;
  transform:rotate(12deg);
}

.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,170,0.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,200,255,0.15), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(140,0,255,0.18), transparent 50%);
  animation:glowMove 6s ease-in-out infinite;
  filter: blur(10px);
}

/* ================= HEADER ================= */
header{
  text-align:center;
  padding:40px 20px 10px;
}

header h1{
  color:#ff4fd8;
  text-shadow:0 0 10px #ff4fd8,0 0 30px #7a00ff;
}

/* ================= PRODUCTS ================= */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:25px;
}

.card{
  background:rgba(20,0,30,0.6);
  border-radius:16px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
  border:1px solid rgba(255,0,170,0.2);
  backdrop-filter: blur(10px);
}

.card::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(45deg,#ff4fd8,#7a00ff,#00e5ff);
  z-index:-1;
  filter:blur(12px);
  opacity:0.3;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#ff4fd8;
  font-size:20px;
  font-weight:bold;
}

.desc{
  opacity:0.8;
  font-size:13px;
  margin-top:8px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(135deg,#ff4fd8,#7a00ff,#00e5ff);
}

/* ================= SOCIAL ================= */
.social-section{
  text-align:center;
  padding:40px 20px;
}

.social-section h2{
  font-size:20px;
  background:linear-gradient(90deg,#ff0050,#00f2ea);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.social-section p{
  font-size:13px;
  opacity:0.6;
}

.social-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
}

.social-btn{
  display:flex;
  align-items:center;
  gap:10px;
  width:85%;
  max-width:280px;
  padding:12px;
  border-radius:14px;
  text-decoration:none;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,0,80,0.3);
  backdrop-filter:blur(10px);
}

.social-btn:hover{
  transform:scale(1.05);
}

.icon svg{
  width:22px;
  height:22px;
  fill:#00f2ea;
}

/* ================= TELEGRAM ================= */
.tg-section{
  text-align:center;
  padding:40px 20px;
}

.tg-section h2{
  font-size:20px;
  background:linear-gradient(90deg,#00e5ff,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.tg-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:center;
}

.tg-grid a{
  width:85%;
  max-width:280px;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#00e5ff;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(0,229,255,0.3);
  backdrop-filter:blur(10px);
  font-weight:bold;
}

.tg-grid a:hover{
  transform:scale(1.05);
  color:#ff4fd8;
  border-color:#ff4fd8;
  box-shadow:0 0 20px rgba(255,79,216,0.3);
}

/* VERIFIED */
.verified{
  margin-left:6px;
  font-size:12px;
  color:#00e5ff;
  text-shadow:0 0 10px #00e5ff,0 0 20px #ff4fd8;
  animation:verifiedGlow 1.5s infinite;
}

@keyframes verifiedGlow{
  0%,100%{transform:scale(1);opacity:0.8;}
  50%{transform:scale(1.2);opacity:1;}
}

/* ================= FOLLOW POPUP ================= */
.follow-overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  z-index:99999;
}

.follow-box{
  width:85%;
  max-width:320px;
  padding:18px;
  border-radius:16px;
  text-align:center;
  background:rgba(10,0,20,0.95);
  border:1px solid rgba(0,242,234,0.3);
}

.follow-box h2{
  background:linear-gradient(90deg,#ff0050,#00f2ea);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.follow-box a{
  display:block;
  color:#00f2ea;
  text-decoration:none;
  margin:8px 0;
  font-weight:bold;
}

.follow-box button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  background:linear-gradient(135deg,#ff0050,#00f2ea);
}

/* ================= FLOATING TG BUTTON ================= */
.float-tg{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:12px 16px;
  border-radius:50px;
  background:linear-gradient(135deg,#0088cc,#00f2ea,#ff4fd8);
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 0 20px rgba(0,242,234,0.4);
  z-index:99999;
  animation:floatPulse 1.8s infinite;
}

.float-tg::before{
  content:"";
  position:absolute;
  inset:-4px;
  border-radius:50px;
  background:linear-gradient(135deg,#0088cc,#00f2ea,#ff4fd8);
  filter:blur(10px);
  opacity:0.6;
  z-index:-1;
}

@keyframes floatPulse{
  0%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
  100%{transform:translateY(0);}
}

/* ================= ANIMATIONS ================= */
@keyframes gridMove{
  0%{transform:translate(0,0) rotate(12deg);}
  100%{transform:translate(-80px,-80px) rotate(12deg);}
}

@keyframes glowMove{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(40px,-25px);}
}

</style>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>SACRED STORE</h1>
</header>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
    <div class="content">
      <h3>7 DAYS PREMIUM</h3>
      <div class="price">₱150</div>
      <button class="btn" onclick="buy('7 DAYS')">BUY NOW</button>
    </div>
  </div>

</div>

<!-- SOCIAL -->
<section class="social-section">
  <h2>FOLLOW US ON TIKTOK</h2>
  <p>Updates & releases</p>

  <div class="social-grid">

    <a class="social-btn" href="https://www.tiktok.com/@aethernmodz" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M12 2v10.2a4.2 4.2 0 1 1-3.6-4.15V5.9A8.2 8.2 0 0 0 6 22a8 8 0 0 0 8-8V8.1a6.7 6.7 0 0 0 4 1.3V6.1a4.9 4.9 0 0 1-4-4.1H12z"/></svg>
      @aethernmodz
    </a>

    <a class="social-btn" href="https://www.tiktok.com/@sacredglidez" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M12 2v10.2a4.2 4.2 0 1 1-3.6-4.15V5.9A8.2 8.2 0 0 0 6 22a8 8 0 0 0 8-8V8.1a6.7 6.7 0 0 0 4 1.3V6.1a4.9 4.9 0 0 1-4-4.1H12z"/></svg>
      @sacredglidez
    </a>

  </div>
</section>

<!-- TELEGRAM -->
<section class="tg-section">
  <h2>TELEGRAM CHANNELS</h2>

  <div class="tg-grid">

    <a href="https://t.me/sacredofficial" target="_blank">
      @sacredofficial <span class="verified">✓</span>
    </a>

    <a href="https://t.me/SacredSyntaxJamalShane" target="_blank">
      @SacredSyntaxJamalShane <span class="verified">✓</span>
    </a>

  </div>
</section>

<!-- FOLLOW POPUP -->
<div class="follow-overlay" id="followPopup">
  <div class="follow-box">
    <h2>FOLLOW US 🔥</h2>
    <p>Stay updated</p>

    <a href="https://www.tiktok.com/@aethernmodz" target="_blank">@aethernmodz</a>
    <a href="https://www.tiktok.com/@sacredglidez" target="_blank">@sacredglidez</a>

    <button onclick="closeFollow()">JOIN NOW</button>
  </div>
</div>

<!-- FLOATING BUTTON -->
<a class="float-tg" href="https://t.me/sacredofficial" target="_blank">
  Telegram
</a>

<script>

function buy(item){
  window.open(
    "https://t.me/sacredph?text=" +
    encodeURIComponent("Buy: " + item),
    "_blank"
  );
}

/* POPUP */
window.addEventListener("DOMContentLoaded", () => {
  const seen = localStorage.getItem("follow_seen");

  if(!seen){
    setTimeout(() => {
      document.getElementById("followPopup").style.display = "flex";
    }, 5000);
  }
});

function closeFollow(){
  document.getElementById("followPopup").style.display = "none";
  localStorage.setItem("follow_seen","true");
}

</script>

</body>
</html>
