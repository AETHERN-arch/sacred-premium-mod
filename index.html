<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED PREMIUM MOD</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:white;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
}

.logo{color:#00e5ff;font-weight:bold}

.menu-btn{
  width:45px;height:45px;
  background:#111;
  border:none;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
}

.menu-btn span{
  width:22px;height:3px;background:#00e5ff;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:25px;
}

.card{
  background:#111;
  border:1px solid #00e5ff33;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#00e5ff;
  font-size:20px;
  margin-top:10px;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy{
  background:linear-gradient(135deg,#00e5ff,#0066ff);
  color:white;
}

.free{
  background:#222;
  color:white;
  border:1px solid #333;
}

/* ADMIN */
.admin{
  position:fixed;
  right:-400px;
  top:0;
  width:380px;
  height:100vh;
  background:#0b0b12;
  padding:15px;
  transition:0.3s;
}

.admin.active{right:0}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:white;
}

.save{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">SACRED PREMIUM MODZZZ</div>
  <button class="menu-btn" onclick="toggleAdmin()">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="products" id="products"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

  <h2>ADMIN PANEL</h2>

  <input type="password" id="pass" placeholder="Password">
  <button class="save" onclick="login()">Login</button>

  <div id="panel" style="display:none">

    <h3>Add Product</h3>

    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <input type="file" id="img">

    <button class="save" onclick="add()">Add Product</button>

    <hr style="margin:15px 0;opacity:0.2">

    <h3>FREE DOWNLOAD (GLOBAL)</h3>
    <input id="freeLink" placeholder="Download link">
    <button class="save" onclick="setFree()">Set Link</button>

  </div>
</div>

<script>

const ADMIN="sacred123";

let products=JSON.parse(localStorage.getItem("p"))||[];

let freeLink="";

function toggleAdmin(){
  document.getElementById("admin").classList.toggle("active");
}

function login(){
  if(document.getElementById("pass").value===ADMIN){
    document.getElementById("panel").style.display="block";
  }else alert("Wrong password");
}

function setFree(){
  freeLink=document.getElementById("freeLink").value;
  alert("Free download updated!");
}

function save(){
  localStorage.setItem("p",JSON.stringify(products));
}

function render(){

  let c=document.getElementById("products");
  c.innerHTML="";

  products.forEach(p=>{

    c.innerHTML+=`
      <div class="card">

        <img src="${p.image}">

        <div class="content">

          <h3>${p.name}</h3>

          <div class="price">${p.price}</div>

          <button class="btn buy"
          onclick="buy('${p.name}')">
          BUY NOW
          </button>

          <button class="btn free"
          onclick="freeDownload()">
          FREE DOWNLOAD
          </button>

        </div>

      </div>
    `;
  });
}

function add(){

  let name=document.getElementById("name").value;
  let price=document.getElementById("price").value;
  let file=document.getElementById("img").files[0];

  if(!name||!price||!file){
    alert("Fill all");
    return;
  }

  let r=new FileReader();

  r.onload=function(e){

    products.push({
      name,
      price,
      image:e.target.result
    });

    save();
    render();
  }

  r.readAsDataURL(file);
}

function buy(name){
  window.open(
    "https://t.me/sacredph?text=" +
    encodeURIComponent("Buy: " + name),
    "_blank"
  );
}

function freeDownload(){

  if(!freeLink){
    alert("No download set");
    return;
  }

  window.open(freeLink,"_blank");
}

render();

</script>

</body>
</html>
