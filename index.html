<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED PREMIUM MOD</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:white;
  overflow-x:hidden;
}

/* ===== NEON BACKGROUND ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background:#05070d;
}

.bg::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    repeating-linear-gradient(
      90deg,
      rgba(0,229,255,0.08) 0px,
      rgba(0,229,255,0.08) 1px,
      transparent 1px,
      transparent 80px
    ),
    repeating-linear-gradient(
      0deg,
      rgba(0,102,255,0.06) 0px,
      rgba(0,102,255,0.06) 1px,
      transparent 1px,
      transparent 80px
    );
  animation: moveLines 12s linear infinite;
  transform:rotate(10deg);
}

.bg::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,229,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,102,255,0.15), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(0,229,255,0.08), transparent 60%);
  animation: glowMove 8s ease-in-out infinite;
}

@keyframes moveLines{
  0%{transform:translate(0,0) rotate(10deg);}
  100%{transform:translate(-80px,-80px) rotate(10deg);}
}

@keyframes glowMove{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(30px,-30px);}
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

.logo{
  color:#00e5ff;
  font-weight:bold;
}

.menu-btn{
  width:45px;
  height:45px;
  background:#111;
  border:none;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
  cursor:pointer;
}

.menu-btn span{
  width:22px;
  height:3px;
  background:#00e5ff;
}

/* ===== PRODUCTS ===== */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:25px;
}

.card{
  background:#111;
  border:1px solid #00e5ff33;
  border-radius:15px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#00e5ff;
  font-size:20px;
  margin-top:10px;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy{
  background:linear-gradient(135deg,#00e5ff,#0066ff);
  color:white;
}

/* ===== ADMIN ===== */
.admin{
  position:fixed;
  right:-400px;
  top:0;
  width:380px;
  height:100vh;
  background:#0b0b12;
  padding:15px;
  transition:0.3s;
  z-index:10;
}

.admin.active{
  right:0;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:white;
}

.save{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#00e5ff;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- NEON BACKGROUND -->
<div class="bg"></div>

<!-- NAV -->
<div class="navbar">
  <div class="logo">SACRED PREMIUM MODZZZ</div>
  <button class="menu-btn" onclick="toggleAdmin()">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

  <h2>ADMIN PANEL</h2>

  <input type="password" id="pass" placeholder="Password">
  <button class="save" onclick="login()">Login</button>

  <div id="panel" style="display:none">

    <h3>Add Product</h3>

    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <input type="file" id="img">

    <button class="save" onclick="add()">Add Product</button>

  </div>
</div>

<script>

const ADMIN = "sacred123";

/* SAFE LOAD */
let products = [];

try {
  products = JSON.parse(localStorage.getItem("p")) || [];
} catch(e){
  products = [];
}

/* TOGGLE ADMIN */
function toggleAdmin(){
  document.getElementById("admin").classList.toggle("active");
}

/* LOGIN */
function login(){
  if(document.getElementById("pass").value === ADMIN){
    document.getElementById("panel").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

/* SAVE */
function save(){
  localStorage.setItem("p", JSON.stringify(products));
}

/* RENDER (FIXED SAFE) */
function render(){

  const c = document.getElementById("products");
  if(!c) return;

  c.innerHTML = "";

  if(products.length === 0){
    c.innerHTML = "<p style='opacity:0.6;text-align:center'>No products yet</p>";
    return;
  }

  products.forEach(p => {

    c.innerHTML += `
      <div class="card">

        <img src="${p.image || ''}">

        <div class="content">

          <h3>${p.name || ''}</h3>

          <!-- PUBLIC PRICE -->
          <div class="price">₱${p.price || '0'}</div>

          <button class="btn buy"
          onclick="buy('${p.name}')">
          BUY NOW
          </button>

        </div>

      </div>
    `;
  });
}

/* ADD PRODUCT */
function add(){

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let file = document.getElementById("img").files[0];

  if(!name || !price || !file){
    alert("Fill all");
    return;
  }

  let r = new FileReader();

  r.onload = function(e){

    products.push({
      name,
      price,
      image: e.target.result
    });

    save();
    render();
  };

  r.readAsDataURL(file);
}

/* BUY */
function buy(name){
  window.open(
    "https://t.me/sacredph?text=" +
    encodeURIComponent("Buy: " + name),
    "_blank"
  );
}

/* INIT */
window.addEventListener("DOMContentLoaded", render);

</script>

</body>
</html>
