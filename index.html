<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED STORE</title>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial;
  background:#040008;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-5;
  background: radial-gradient(circle at top,#1a0025,#040008);
}

/* ================= HEADER ================= */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

header h1{
  color:#ff4fd8;
  font-size:20px;
  text-shadow:0 0 10px #ff4fd8;
}

/* ================= MENU BUTTON ================= */
.menu-btn{
  width:45px;
  height:45px;
  background:#111;
  border:none;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
  border-radius:10px;
  cursor:pointer;
}

.menu-btn span{
  width:22px;
  height:3px;
  background:#00e5ff;
}

/* ================= DROPDOWN ================= */
.dropdown{
  position:absolute;
  right:20px;
  top:70px;
  width:200px;
  background:rgba(10,0,20,0.95);
  border:1px solid rgba(0,229,255,0.3);
  border-radius:12px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:999;
}

.dropdown button{
  padding:12px;
  background:none;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.dropdown button:hover{
  background:rgba(0,229,255,0.1);
}

/* ================= SECTIONS ================= */
.section{
  display:none;
  padding:20px;
}

.section.active{
  display:block;
}

/* ================= PRODUCTS ================= */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(20,0,30,0.6);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,0,170,0.2);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.price{
  color:#ff4fd8;
  font-weight:bold;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#ff4fd8,#7a00ff,#00e5ff);
  color:white;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HEADER -->
<header>
  <h1>SACRED STORE</h1>

  <button class="menu-btn" onclick="toggleDropdown()">
    <span></span><span></span><span></span>
  </button>

  <!-- DROPDOWN -->
  <div class="dropdown" id="dropdown">

    <button onclick="showSection('products')">📦 PRODUCTS</button>
    <button onclick="showSection('telegram')">📢 TELEGRAM CHANNELS</button>
    <button onclick="showSection('tiktok')">🎵 TIKTOK</button>

  </div>
</header>

<!-- ================= PRODUCTS ================= -->
<section id="products" class="section active">

  <div class="container">

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>7 DAYS PREMIUM</h3>
        <div class="price">₱150</div>
        <button class="btn" onclick="buy('7 DAYS')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>15 DAYS PREMIUM</h3>
        <div class="price">₱250</div>
        <button class="btn" onclick="buy('15 DAYS')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>1 MONTH PREMIUM</h3>
        <div class="price">₱400</div>
        <button class="btn" onclick="buy('1 MONTH')">BUY NOW</button>
      </div>
    </div>

    <div class="card">
      <img src="https://raw.githubusercontent.com/AETHERN-arch/sacred-premium-mod/main/IMG_20260512_150639_887.jpg">
      <div class="content">
        <h3>LIFETIME</h3>
        <div class="price">₱650</div>
        <button class="btn" onclick="buy('LIFETIME')">BUY NOW</button>
      </div>
    </div>

  </div>

</section>

<!-- ================= TELEGRAM ================= -->
<section id="telegram" class="section">

  <h2>TELEGRAM CHANNELS</h2>

  <p>@sacredofficial</p>
  <p>@SacredSyntaxJamalShane</p>

</section>

<!-- ================= TIKTOK ================= -->
<section id="tiktok" class="section">

  <h2>TIKTOK</h2>

  <p>@aethernmodz</p>
  <p>@sacredglidez</p>

</section>

<script>

/* TOGGLE DROPDOWN */
function toggleDropdown(){
  const d = document.getElementById("dropdown");
  d.style.display = (d.style.display === "flex") ? "none" : "flex";
}

/* SWITCH SECTION */
function showSection(id){

  document.getElementById("products").classList.remove("active");
  document.getElementById("telegram").classList.remove("active");
  document.getElementById("tiktok").classList.remove("active");

  document.getElementById(id).classList.add("active");

  document.getElementById("dropdown").style.display = "none";
}

/* BUY */
function buy(item){
  window.open(
    "https://t.me/sacredph?text=" +
    encodeURIComponent("Buy: " + item),
    "_blank"
  );
}

</script>

</body>
</html>
