<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SACRED MOD</title>

<style>
:root{
  --bg:#05070d;
  --panel:rgba(255,255,255,0.04);
  --border:rgba(0,229,255,0.15);
  --neon:#00e5ff;
}

*{
  margin:0;
  padding:0;
  font-family:Arial;
  box-sizing:border-box;
}

body{
  background:radial-gradient(circle at top,#0b1220,#05070d);
  color:white;
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* LOGIN SCREEN */
#loginScreen{
  position:fixed;
  inset:0;
  background:#05070d;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#loginScreen input{
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:white;
  border-radius:8px;
}

#loginScreen button{
  padding:10px;
  margin-top:10px;
  background:var(--neon);
  border:none;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:15px;
}

.logo{
  color:var(--neon);
  font-weight:bold;
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:transparent;
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  overflow:auto;
  padding:20px;
}

.section{display:none}
.section.active{display:block}

/* DASHBOARD */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:15px;
  border-radius:14px;
  text-align:center;
}

.card h2{color:var(--neon)}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.pcard{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.pcard img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.pbody{
  padding:12px;
}

.price{color:var(--neon)}

.btn{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy{
  background:linear-gradient(135deg,#00e5ff,#0066ff);
  color:white;
}

/* ORDERS / MSG */
.box{
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px;
  margin-top:10px;
  border-radius:12px;
}

.msg img{
  width:100%;
  margin-top:8px;
  border-radius:10px;
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#111;
  border:none;
  color:white;
  border-radius:8px;
}

.save{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:var(--neon);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>OWNER LOGIN</h2>
  <input id="pass" type="password" placeholder="Enter password">
  <button onclick="login()">LOGIN</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">SACRED MOD</div>
  <button onclick="show('dash')">📊 Dashboard</button>
  <button onclick="show('shop')">🛒 Products</button>
  <button onclick="show('orders')">📦 Orders</button>
  <button onclick="show('inbox')">📩 Inbox</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASH -->
<div id="dash" class="section active">
  <h2>Dashboard</h2>

  <div class="grid">
    <div class="card"><h2 id="sales">0</h2><p>Sales</p></div>
    <div class="card"><h2 id="ordersCount">0</h2><p>Orders</p></div>
    <div class="card"><h2 id="pending">0</h2><p>Pending</p></div>
    <div class="card"><h2 id="done">0</h2><p>Done</p></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="shop" class="section">
  <h2>Products</h2>

  <input id="name" placeholder="Name">
  <input id="price" placeholder="Price">
  <textarea id="desc" placeholder="Desc"></textarea>
  <input type="file" id="img">
  <button class="save" onclick="add()">Add Product</button>

  <div id="products" class="products"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="section">
  <h2>Orders</h2>
  <div id="ordersBox"></div>
</div>

<!-- INBOX -->
<div id="inbox" class="section">
  <h2>Inbox</h2>
  <input type="file" id="msgImg">
  <div id="msgBox"></div>
</div>

</div>

<script>

const PASS="sacred123";
let ok=false;

let products=JSON.parse(localStorage.getItem("p"))||[];
let orders=JSON.parse(localStorage.getItem("o"))||[];
let msgs=JSON.parse(localStorage.getItem("m"))||[];

/* LOGIN */
function login(){
if(pass.value===PASS){
document.getElementById("loginScreen").style.display="none";
ok=true;
}else alert("Wrong");
}

/* NAV */
function show(id){
if(!ok)return alert("Login first");

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");
}

/* ADD PRODUCT */
function add(){
let r=new FileReader();
r.onload=e=>{
products.push({
n:name.value,
p:price.value,
d:desc.value,
img:e.target.result
});
save();render();
}
r.readAsDataURL(img.files[0]);
}

/* BUY -> ORDER + DM */
function buy(n,p){

let imgFile=document.getElementById("msgImg").files[0];

let pushMsg=(img)=>{

msgs.push({
id:"MSG-"+Math.floor(Math.random()*999999),
product:n,
price:p,
img:img,
date:new Date().toLocaleString()
});

save();renderInbox();
}

if(imgFile){
let r=new FileReader();
r.onload=e=>pushMsg(e.target.result);
r.readAsDataURL(imgFile);
}else pushMsg(null);

orders.push({
id:"ORD-"+Math.floor(Math.random()*999999),
product:n,
price:p,
status:"Pending"
});

save();update();
alert("🧾 ORDER SENT");
}

/* SAVE */
function save(){
localStorage.setItem("p",JSON.stringify(products));
localStorage.setItem("o",JSON.stringify(orders));
localStorage.setItem("m",JSON.stringify(msgs));
}

/* RENDER PRODUCTS */
function render(){

let c=document.getElementById("products");
c.innerHTML="";

products.forEach(p=>{
c.innerHTML+=`
<div class="pcard">
<img src="${p.img}">
<div class="pbody">
<h3>${p.n}</h3>
<p>${p.d}</p>
<div class="price">${p.p}</div>
<button class="btn buy" onclick="buy('${p.n}','${p.p}')">BUY</button>
</div></div>`;
});

update();
}

/* DASH */
function update(){

let s=0,p=0,d=0;

orders.forEach(o=>{
s+=parseFloat(o.price)||0;
o.status==="Done"?d++:p++;
});

sales.innerText=s;
ordersCount.innerText=orders.length;
pending.innerText=p;
done.innerText=d;

renderOrders();
}

/* ORDERS */
function renderOrders(){
ordersBox.innerHTML="";

orders.forEach((o,i)=>{
ordersBox.innerHTML+=`
<div class="box">
<b>${o.product}</b><br>
${o.price}<br>
${o.status}
</div>`;
});
}

/* INBOX */
function renderInbox(){
msgBox.innerHTML="";

msgs.forEach(m=>{
msgBox.innerHTML+=`
<div class="box msg">
<b>${m.product}</b><br>
${m.price}<br>
${m.date}
${m.img?`<img src="${m.img}">`:""}
</div>`;
});
}

/* INIT */
render();

</script>

</body>
</html>
